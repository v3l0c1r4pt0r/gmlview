<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>Mapa działek</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}
#map {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// =============================
// 1. Odczyt parametrów z URL
// =============================
const params = new URLSearchParams(window.location.search);
const file = params.get("file");
const idDzialki = params.get("idDzialki");

// =============================
// 2. Inicjalizacja mapy
// =============================
const map = L.map('map').setView([52.1, 19.4], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// =============================
// 3. Budowa URL do PHP
// =============================
let apiUrl = "gml2geojson.php";

if (file || idDzialki) {
    const forwardParams = new URLSearchParams();
    if (file) forwardParams.set("file", file);
    if (idDzialki) forwardParams.set("idDzialki", idDzialki);
    apiUrl += "?" + forwardParams.toString();
}

// =============================
// 4. Pobranie GeoJSON
// =============================
fetch(apiUrl)
    .then(response => response.json())
    .then(data => {

        const geoLayer = L.geoJSON(data, {
            style: {
                color: "#ff0000",
                weight: 2,
                fillOpacity: 0.1
            }
        }).addTo(map);

        // Auto-zoom do działek
        if (geoLayer.getBounds().isValid()) {
            map.fitBounds(geoLayer.getBounds());
        }
    })
    .catch(err => {
        console.error("Błąd ładowania GeoJSON:", err);
    });

</script>

</body>
</html>
