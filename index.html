<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>Mapa działek</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}
#map {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<script>

proj4.defs("EPSG:2178",
 "+proj=tmerc +lat_0=0 +lon_0=21 +k=0.999923 +x_0=7500000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs +type=crs");

async function fetchAndDrawMissingParcels(parcels, map) {
  for (const parcel of parcels) {

      try {
        const url = `https://uldk.gugik.gov.pl/?request=GetParcelByIdOrNr&id=${parcel.properties.idDzialki}&result=teryt,parcel,geom_wkt&srid=4326`;

        const response = await fetch(url);
        const text = await response.text();

        // format:
        // 101205_4.0005.182|182|SRID=4326;POLYGON((lon lat,lon lat,...))

        const lines = text.trim().split("\n");
        if (lines.length < 2) continue;

        const parts = lines[1].split("|");
        if (parts.length < 3) continue;

        const wktFull = parts[2];

        if (!wktFull.includes("POLYGON")) continue;

        // wyciągamy część po SRID
        const wkt = wktFull.split(";")[1];

        // usuwamy POLYGON(( i ))
        const coordsRaw = wkt
          .replace("POLYGON((", "")
          .replace("))", "");

        // zamieniamy na tablicę [lat, lon] dla Leaflet
        const coordinates = coordsRaw.split(",").map(pair => {
          const [lon, lat] = pair.trim().split(" ").map(Number);
          return [lat, lon]; // Leaflet używa [lat, lon]
        });

        // zapisz do obiektu
        parcel.geometry = coordinates;

        // narysuj na mapie
        L.polygon(coordinates, {
          color: "red",
          weight: 2
        }).addTo(map);

        console.log(`✔ Dorysowano działkę ${parcel.id}`);

      } catch (err) {
        console.error(`Błąd dla ${parcel.id}`, err);
      }
  }
}

// =============================
// 1. Odczyt parametrów z URL
// =============================
const params = new URLSearchParams(window.location.search);
const file = params.get("file");
const idDzialki = params.get("idDzialki");

// =============================
// 2. Inicjalizacja mapy
// =============================
const map = L.map('map').setView([52.1, 19.4], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// =============================
// 3. Budowa URL do PHP
// =============================
let apiUrl = "gml2geojson.php";

if (file || idDzialki) {
    const forwardParams = new URLSearchParams();
    if (file) forwardParams.set("file", file);
    if (idDzialki) forwardParams.set("idDzialki", idDzialki);
    apiUrl += "?" + forwardParams.toString();
}

// =============================
// 4. Pobranie GeoJSON
// =============================
fetch(apiUrl)
    .then(response => response.json())
    .then(data => {

        function transformCoords(coords) {
            return coords.map(ring =>
                ring.map(point => {
                    const converted = proj4("EPSG:2178", "EPSG:4326", point);
                    return [converted[0], converted[1]]; // Leaflet = [lat, lon]
                })
            );
        }

        data.features.forEach(f => {
            if (f.geometry.type === "Polygon") {
                f.geometry.coordinates = transformCoords(f.geometry.coordinates);
            }
        });

        const geoLayer = L.geoJSON(data, {
            style: {
                color: "#ff0000",
                weight: 2,
                fillOpacity: 0.1
            }
        }).addTo(map);

        if (geoLayer.getBounds().isValid()) {
            map.fitBounds(geoLayer.getBounds());
        }

        // 🔹 WYBIERAMY TYLKO PUSTE DZIAŁKI
        const missingParcels = data.features.filter(f =>
            !f.geometry ||
            !f.geometry.coordinates ||
            !f.geometry.coordinates[0] ||
            f.geometry.coordinates[0].length === 0
        );

        // 🔹 Odpalamy w tle (bez await!)
        if (missingParcels.length > 0) {
            fetchAndDrawMissingParcels(missingParcels, geoLayer);
        }

        map.fitBounds(geoLayer.getBounds());

        // Auto-zoom do działek
        if (geoLayer.getBounds().isValid()) {
            map.fitBounds(geoLayer.getBounds());
        }
    })
    .catch(err => {
        console.error("Błąd ładowania GeoJSON:", err);
    });

</script>

</body>
</html>
